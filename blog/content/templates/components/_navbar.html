         <a href="/register/"
            class="text-sm font-semibold text-white bg-green-600 hover:bg-green-700 transition-colors px-5 py-2 rounded-full focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 focus-visible:ring-offset-2">Get

      </div>

      <!-- Mobile hamburger -->
      <button type="button" aria-controls="collapseMenu" aria-expanded="false" aria-haspopup="true" id="toggleOpen"
         class="lg:hidden p-1 rounded text-gray-500 hover:text-gray-900 focus:outline-none focus-visible:ring-2 focus-visible:ring-green-500 cursor-pointer">

   <!-- Mobile menu drawer -->
   <div id="collapseMenu" tabindex="-1"
      class="hidden fixed inset-0 z-50 lg:hidden">
      <!-- Backdrop -->
      <div id="menuBackdrop" class="absolute inset-0 bg-black/30"></div>
      <!-- Panel -->
      <div

         <div class="flex items-center justify-between px-5 h-16 border-b border-gray-200">

               <svg class="size-5 fill-current" viewBox="0 0 329.269 329" xmlns="http://www.w3.org/2000/svg"

                  <path
                     d="M194.8 164.77 323.013 36.555c8.343-8.34 8.343-21.825 0-30.164-8.34-8.34-21.825-8.34-30.164 0L164.633 134.605 36.422 6.391c-8.344-8.34-21.824-8.34-30.164 0-8.344 8.34-8.344 21.824 0 30.164l128.21 128.215L6.259 292.984c-8.344 8.34-8.344 21.825 0 30.164a21.27 21.27 0 0 0 15.082 6.25c5.46 0 10.922-2.09 15.082-6.25l128.21-128.214 128.216 128.214a21.27 21.27 0 0 0 15.082 6.25c5.46 0 10.922-2.09 15.082-6.25 8.343-8.34 8.343-21.824 0-30.164zm0 0" />

            <li><a href="{% url 'create_blog' %}" class="hover:text-gray-900 transition-colors">Write</a></li>
            <li><a href="#" class="hover:text-gray-900 transition-colors">About</a></li>

</nav>

<script>
   (function () {
      var open = document.getElementById('toggleOpen');
      var close = document.getElementById('toggleClose');
      var backdrop = document.getElementById('menuBackdrop');
      var menu = document.getElementById('collapseMenu');
      function openMenu() { menu.classList.remove('hidden'); open.setAttribute('aria-expanded', 'true'); }
      function closeMenu() { menu.classList.add('hidden'); open.setAttribute('aria-expanded', 'false'); }
      if (open) open.addEventListener('click', openMenu);
      if (close) close.addEventListener('click', closeMenu);
      if (backdrop) backdrop.addEventListener('click', closeMenu);
   })();
</script>
